<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Color en vivo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      transition: background-color 0.3s;
    }

    button {
      padding: 20px 40px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button onclick="cambiar()">Cambiar color</button>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  function cambiar() {
    socket.emit("changeColor");
  }

  socket.on("colorChange", (color) => {
    document.body.style.backgroundColor = color;
  });
</script>

</body>
</html>
